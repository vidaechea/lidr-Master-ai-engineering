services:

  # ─────────────────────────────────────────────────────────────────────────
  # Infrastructure
  # ─────────────────────────────────────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-estimator}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-estimator_dev}
      POSTGRES_DB: ${POSTGRES_DB:-estimator}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-estimator} -d ${POSTGRES_DB:-estimator}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis/redis-stack-server:latest
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # ─────────────────────────────────────────────────────────────────────────
  # One-shot init — creates the langfuse DB inside postgres if absent.
  # Works on both fresh and existing postgres volumes.
  # ─────────────────────────────────────────────────────────────────────────
  db-init:
    image: pgvector/pgvector:pg16
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD:-estimator_dev}
    command: >
      sh -c "psql -h postgres -U ${POSTGRES_USER:-estimator}
      -d ${POSTGRES_DB:-estimator}
      -c 'CREATE DATABASE langfuse'
      || echo 'langfuse database already exists — skipping'"
    restart: "no"

  # ─────────────────────────────────────────────────────────────────────────
  # Observability  (LLM tracing, cost, latency — http://localhost:3000)
  # ─────────────────────────────────────────────────────────────────────────
  langfuse:
    image: langfuse/langfuse:2
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER:-estimator}:${POSTGRES_PASSWORD:-estimator_dev}@postgres:5432/langfuse"
      NEXTAUTH_URL: ${LANGFUSE_URL:-http://localhost:3000}
      NEXTAUTH_SECRET: ${LANGFUSE_SECRET:-langfuse_secret_dev_change_me}
      SALT: ${LANGFUSE_SALT:-langfuse_salt_dev_change_me}
      TELEMETRY_ENABLED: "false"
      LANGFUSE_ENABLE_EXPERIMENTAL_FEATURES: "false"
    depends_on:
      db-init:
        condition: service_completed_successfully
    restart: unless-stopped

  # ─────────────────────────────────────────────────────────────────────────
  # AI Engine  (ai-engine — internal, not exposed publicly)
  # ─────────────────────────────────────────────────────────────────────────
  ai-engine:
    build:
      context: ./ai-engine
      dockerfile: Dockerfile
    expose:
      - "8001"
    env_file:
      - path: ./.env
        required: false
      - path: ./ai-engine/.env
        required: false
    environment:
      UVICORN_HOST: "0.0.0.0"
      UVICORN_PORT: "8001"
      DATABASE_URL: "postgresql+asyncpg://${POSTGRES_USER:-estimator}:${POSTGRES_PASSWORD:-estimator_dev}@postgres:5432/${POSTGRES_DB:-estimator}"
      REDIS_URL: "redis://redis:6379"
      CACHE_ENABLED: ${CACHE_ENABLED:-true}
      SEMANTIC_CACHE_ENABLED: ${SEMANTIC_CACHE_ENABLED:-false}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  ai-engine-worker:
    build:
      context: ./ai-engine
      dockerfile: Dockerfile
    command: arq app.worker.WorkerSettings
    env_file:
      - path: ./.env
        required: false
      - path: ./ai-engine/.env
        required: false
    environment:
      DATABASE_URL: "postgresql+asyncpg://${POSTGRES_USER:-estimator}:${POSTGRES_PASSWORD:-estimator_dev}@postgres:5432/${POSTGRES_DB:-estimator}"
      REDIS_URL: "redis://redis:6379"
      CACHE_ENABLED: ${CACHE_ENABLED:-true}
      SEMANTIC_CACHE_ENABLED: ${SEMANTIC_CACHE_ENABLED:-false}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ─────────────────────────────────────────────────────────────────────────
  # Business API  (new backend — public-facing)
  # ─────────────────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./application-web/backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - path: ./.env
        required: false
      - path: ./backend/.env
        required: false
    environment:
      DATABASE_URL: "postgresql+asyncpg://${POSTGRES_USER:-estimator}:${POSTGRES_PASSWORD:-estimator_dev}@postgres:5432/${POSTGRES_DB:-estimator}"
      REDIS_URL: "redis://redis:6379"
      AI_ENGINE_URL: "http://ai-engine:8001"
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ai-engine:
        condition: service_started
    restart: unless-stopped

  # ─────────────────────────────────────────────────────────────────────────
  # Angular SPA  (dev server — replaced by nginx in production)
  # ─────────────────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./application-web/frontend
      dockerfile: Dockerfile
    ports:
      - "4200:80"
    environment:
      API_URL: "http://localhost:8000"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
