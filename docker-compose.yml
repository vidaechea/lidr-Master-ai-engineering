services:

  # ─────────────────────────────────────────────────────────────────────────
  # Infrastructure
  # ─────────────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-estimator}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-estimator_dev}
      POSTGRES_DB: ${POSTGRES_DB:-estimator}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-estimator}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis/redis-stack-server:latest
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # ─────────────────────────────────────────────────────────────────────────
  # AI Engine  (ai-engine — internal, not exposed publicly)
  # ─────────────────────────────────────────────────────────────────────────
  ai-engine:
    build:
      context: ./ai-engine
      dockerfile: Dockerfile
    expose:
      - "8001"
    env_file:
      - path: ./.env
        required: false
      - path: ./ai-engine/.env
        required: false
    environment:
      UVICORN_HOST: "0.0.0.0"
      UVICORN_PORT: "8001"
      REDIS_URL: "redis://redis:6379"
      CACHE_ENABLED: ${CACHE_ENABLED:-true}
      SEMANTIC_CACHE_ENABLED: ${SEMANTIC_CACHE_ENABLED:-false}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  ai-engine-worker:
    build:
      context: ./ai-engine
      dockerfile: Dockerfile
    command: python -m arq app.worker.WorkerSettings
    env_file:
      - path: ./.env
        required: false
      - path: ./ai-engine/.env
        required: false
    environment:
      REDIS_URL: "redis://redis:6379"
      CACHE_ENABLED: ${CACHE_ENABLED:-true}
      SEMANTIC_CACHE_ENABLED: ${SEMANTIC_CACHE_ENABLED:-false}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ─────────────────────────────────────────────────────────────────────────
  # Business API  (new backend — public-facing)
  # ─────────────────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - path: ./.env
        required: false
      - path: ./backend/.env
        required: false
    environment:
      DATABASE_URL: "postgresql+asyncpg://${POSTGRES_USER:-estimator}:${POSTGRES_PASSWORD:-estimator_dev}@postgres:5432/${POSTGRES_DB:-estimator}"
      REDIS_URL: "redis://redis:6379"
      AI_ENGINE_URL: "http://ai-engine:8001"
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ai-engine:
        condition: service_started
    restart: unless-stopped

  # ─────────────────────────────────────────────────────────────────────────
  # Angular SPA  (dev server — replaced by nginx in production)
  # ─────────────────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "4200:80"
    environment:
      API_URL: "http://localhost:8000"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
