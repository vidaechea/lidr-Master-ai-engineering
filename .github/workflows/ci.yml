name: CI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main, develop]

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # ai-engine — lint + unit tests
  # ──────────────────────────────────────────────────────────────────────────
  ai-engine:
    name: ai-engine (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        working-directory: ai-engine
        run: uv sync --all-groups

      - name: Download spaCy model
        working-directory: ai-engine
        run: uv run python -m spacy download en_core_web_sm

      - name: Lint (ruff)
        working-directory: ai-engine
        run: |
          pip install ruff
          ruff check app/ --select E,F,W --ignore E501

      - name: Unit tests
        working-directory: ai-engine
        env:
          APP_ENV: test
          DATABASE_URL: sqlite+aiosqlite:///./test.db
          REDIS_URL: redis://localhost:6379
          OPENAI_API_KEY: sk-test-placeholder
          ANTHROPIC_API_KEY: test-placeholder
          INTERNAL_API_KEY: test-internal-key
        run: >
          uv run pytest tests/unit
          -m "not llm_live and not slow"
          --tb=short
          -q
          --cov=app
          --cov-report=term-missing
          --cov-fail-under=0

  # ──────────────────────────────────────────────────────────────────────────
  # backend — lint + unit tests
  # ──────────────────────────────────────────────────────────────────────────
  backend:
    name: backend (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        working-directory: application-web/backend
        run: uv sync --all-groups

      - name: Lint (ruff)
        working-directory: application-web/backend
        run: |
          pip install ruff
          ruff check app/ --select E,F,W --ignore E501

      - name: Unit tests
        working-directory: application-web/backend
        env:
          APP_ENV: test
          DATABASE_URL: sqlite+aiosqlite:///./test.db
          REDIS_URL: redis://localhost:6379
          SECRET_KEY: ci-test-secret-key
          INTERNAL_API_KEY: test-internal-key
        run: >
          uv run pytest tests/unit
          --tb=short
          -q
          --cov=app
          --cov-report=term-missing
          --cov-fail-under=0

  # ──────────────────────────────────────────────────────────────────────────
  # frontend — build
  # ──────────────────────────────────────────────────────────────────────────
  frontend:
    name: frontend (Node 20)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: application-web/frontend/package-lock.json

      - name: Install dependencies
        working-directory: application-web/frontend
        run: npm ci --legacy-peer-deps

      - name: Build (production)
        working-directory: application-web/frontend
        run: npm run build -- --configuration=production

  # ──────────────────────────────────────────────────────────────────────────
  # Docker build — validates both Dockerfiles compile correctly
  # ──────────────────────────────────────────────────────────────────────────
  docker-build:
    name: Docker build (${{ matrix.service }})
    runs-on: ubuntu-latest
    needs: [ai-engine, backend, frontend]
    strategy:
      matrix:
        include:
          - service: ai-engine
            context: ai-engine
            dockerfile: ai-engine/Dockerfile
          - service: backend
            context: application-web/backend
            dockerfile: application-web/backend/Dockerfile

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build ${{ matrix.service }} image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: false
          tags: ${{ matrix.service }}:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
