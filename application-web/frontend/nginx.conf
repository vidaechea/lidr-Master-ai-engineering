server {
    listen 80;
    server_name _;

    # Docker DNS for service discovery inside the compose network.
    resolver 127.0.0.11 valid=30s ipv6=off;

    root /usr/share/nginx/html;
    index index.html;

    # Proxy API calls to the backend service
    location /api/ {
        # Strip the /api prefix and dynamically resolve backend on each request.
        rewrite ^/api/?(.*)$ /$1 break;
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 300s;   # ACB pipeline: actor + critic + boss × N iterations
        proxy_send_timeout 300s;
        proxy_connect_timeout 10s;
    }

    # Angular HTML5 routing — always serve index.html for unknown paths
    location / {
        try_files $uri $uri/ /index.html;
    }
}
