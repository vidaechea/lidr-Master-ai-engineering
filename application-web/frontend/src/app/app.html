<mat-toolbar color="primary">
  <span>Estimator</span>
  @if (auth.isLoggedIn()) {
    <span class="spacer"></span>
    <button mat-button type="button" disabled class="menu-disabled" aria-disabled="true">Projects</button>
    <a mat-button routerLink="/estimations" routerLinkActive="active-link">Estimations</a>
    <a mat-button routerLink="/estimations/settings" routerLinkActive="active-link">Settings</a>
    @if (activeModel()) {
      <span class="model-badge" title="Active primary model">{{ activeModel() }}</span>
    }
    <button mat-button (click)="auth.logout()">Sign out</button>
  }
</mat-toolbar>

<main class="main-content">
  <router-outlet />
</main>
